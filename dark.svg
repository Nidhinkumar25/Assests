<!-- dark.svg -->
<svg xmlns="http://w3.org" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://googleapis.com');
      .title-text { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 34px; fill: #F8FAFC; }
      .role-label { font-family: 'JetBrains+Mono', monospace; font-weight: 400; font-size: 20px; fill: #67E8F9; }
      .role-text { font-family: 'JetBrains+Mono', monospace; font-weight: 700; font-size: 20px; fill: #22D3EE; }
      .info-label { font-family: 'JetBrains+Mono', monospace; font-weight: 700; font-size: 14px; fill: #7C3AED; letter-spacing: 1px; }
      .info-value { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; fill: #94A3B8; }
      .pill-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; fill: #F8FAFC; text-anchor: middle; }
      .social-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; fill: #94A3B8; }
      .ascii-text { font-family: 'JetBrains+Mono', monospace; font-weight: 700; font-size: 11px; line-height: 11px; letter-spacing: 1px; }
    </style>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#0b0f19" />
    </linearGradient>
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="border-shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"><animate attributeName="offset" values="0;1;0" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#22D3EE"><animate attributeName="offset" values="0.2;0.8;0.2" dur="8s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#10B981"><animate attributeName="offset" values="0.5;1;0.5" dur="8s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="glow-pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Patterns -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#ffffff" stroke-opacity="0.015" stroke-width="1" />
    </pattern>
    <pattern id="noise" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#ffffff" fill-opacity="0.02"/>
      <rect x="2" y="2" width="2" height="2" fill="#ffffff" fill-opacity="0.01"/>
    </pattern>

    <!-- Clip Paths for Role Loop -->
    <clipPath id="clip-role1"><rect x="175" y="105" height="40" width="0"><animate attributeName="width" values="0;0;160;160;0;0" keys="0;0.05;0.25;0.45;0.5;1" dur="7s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="clip-role2"><rect x="175" y="105" height="40" width="0"><animate attributeName="width" values="0;0;260;260;0;0" keys="0;0.55;0.75;0.95;1;1" dur="7s" repeatCount="indefinite" /></rect></clipPath>
  </defs>

  <!-- Background Layer -->
  <rect width="1180" height="610" rx="16" fill="url(#bg-grad)" stroke="url(#border-shimmer)" stroke-width="2.5"/>
  <rect width="1180" height="610" rx="16" fill="url(#scanlines)"/>
  <rect width="1180" height="610" rx="16" fill="url(#noise)"/>

  <!-- Ambient Background Lights -->
  <circle cx="200" cy="250" r="180" fill="url(#glow-pulse)">
    <animate attributeName="r" values="160;200;160" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="400" r="250" fill="url(#glow-pulse)" opacity="0.7">
    <animate attributeName="r" values="250;220;250" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- LEFT PANEL: ASCII ART PORTRAIT -->
  <g transform="translate(30, 30)">
    <!-- Panel Base -->
    <rect width="425" height="550" rx="12" fill="url(#panel-grad)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <path d="M 15,0 L 45,0 M 0,15 L 0,45" stroke="#7C3AED" stroke-width="3" fill="none" transform="translate(0,0)"/>
    
    <!-- ASCII Art Canvas Container with floating motion -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="5s" repeatCount="indefinite" ease="sine"/>
      
      <!-- Visual Scanline Accent -->
      <line x1="20" y1="20" x2="405" y2="20" stroke="#22D3EE" stroke-opacity="0.2" stroke-width="1">
        <animate attributeName="y1" values="20;530;20" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="20;530;20" dur="10s" repeatCount="indefinite"/>
      </line>

      <!-- Portait Base Masked/Sequenced Reveal -->
      <g transform="translate(35, 55)" filter="url(#subtle-glow)">
        <!-- Line-by-line typing reveal overlay simulation -->
        <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
        
        <!-- Text Layers divided by tonal zones -->
        <!-- Hair Zone (Violet) -->
        <g fill="#A78BFA">
          <text x="0" y="20" class="ascii-text">      .++**%%%%%%################%%%%%*+-.      </text>
          <text x="0" y="32" class="ascii-text">    -+*%%%%############################%*+-    </text>
          <text x="0" y="44" class="ascii-text">   =*%%%##################################%*=  </text>
          <text x="0" y="56" class="ascii-text">  =#%%######################################%= </text>
          <text x="0" y="68" class="ascii-text"> -#%%########################################%-</text>
          <text x="0" y="80" class="ascii-text"> *%%##########################################*</text>
          <text x="0" y="92" class="ascii-text"> *%###########################################*</text>
        </g>
        
        <!-- Face Outline & Shadows (Cyan) -->
        <g fill="#22D3EE">
          <text x="0" y="104" class="ascii-text"> *%################%*++=====++*##############%*</text>
          <text x="0" y="116" class="ascii-text"> #%#############*-.            .-*############%</text>
          <text x="0" y="128" class="ascii-text"> #%###########+.                  .+##########%</text>
          <text x="0" y="140" class="ascii-text"> #%##########:                      :##########</text>
          <text x="0" y="152" class="ascii-text"> -%#########:    -%%%-      -%%%-    :#########-</text>
          <text x="0" y="164" class="ascii-text">  *########:    *@@@@%*    *@@@@%*    :########* </text>
          <text x="0" y="176" class="ascii-text">  .#######:     %@@@@@@    %@@@@@@     :#######. </text>
          <text x="0" y="188" class="ascii-text">   :#####:       *@@@@*      *@@@@*      :#####:  </text>
        </g>

        <!-- Midtones / Inner Facial Contours (Light Cyan) -->
        <g fill="#67E8F9">
          <text x="0" y="200" class="ascii-text">    ####:         .-.          .-.         :####   </text>
          <text x="0" y="212" class="ascii-text">    ###:                            :###   </text>
          <text x="0" y="224" class="ascii-text">    ###:            ==      ==            :###   </text>
          <text x="0" y="236" class="ascii-text">    ###:           -##-    -##-           :###   </text>
          <text x="0" y="248" class="ascii-text">    ####:          +##+====+##+          :####   </text>
          <text x="0" y="260" class="ascii-text">    .####:          +########+          :####.   </text>
          <text x="0" y="272" class="ascii-text">     :####:          .-++++-.          :####:    </text>
          <text x="0" y="284" class="ascii-text">      :####-.                        .-####:     </text>
        </g>

        <!-- Beard / Moustache / Lips (Near-White Cyan Highlighted Structure) -->
        <g fill="#E0F2FE">
          <text x="0" y="296" class="ascii-text">       :#####-.                    .-#####:      </text>
          <text x="0" y="308" class="ascii-text">        .######+=-..          ..-=+######.       </text>
          <text x="0" y="320" class="ascii-text">          *#########%********%#########*         </text>
          <text x="0" y="332" class="ascii-text">           +##########################+          </text>
          <text x="0" y="344" class="ascii-text">            :########################:           </text>
          <text x="0" y="356" class="ascii-text">             .######################.            </text>
          <text x="0" y="368" class="ascii-text">               -##################-              </text>
          <text x="0" y="380" class="ascii-text">                 +##############+                </text>
          <text x="0" y="392" class="ascii-text">                  .############.                 </text>
        </g>

        <!-- Neck & Collar Zone (Muted Blue) -->
        <g fill="#60A5FA">
          <text x="0" y="404" class="ascii-text">                   ##########                    </text>
          <text x="0" y="416" class="ascii-text">                  ############                   </text>
          <text x="0" y="428" class="ascii-text">                 ##############                  </text>
          <text x="0" y="440" class="ascii-text">             .-+################+-.              </text>
          <text x="0" y="452" class="ascii-text">          .-+######################+-.           </text>
          <text x="0" y="464" class="ascii-text">        -+############################+-         </text>
        </g>
      </g>
    </g>
  </g>
