```xml
<!-- light.svg -->
<svg xmlns="http://w3.org" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://googleapis.com');
      .title-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 34px; fill: #0F172A; }
      .terminal-prompt { font-family: 'Fira Code', monospace; font-weight: 700; font-size: 20px; fill: #06B6D4; }
      .terminal-role { font-family: 'Fira Code', monospace; font-weight: 500; font-size: 20px; fill: #2563EB; }
      .label-text { font-family: 'Fira Code', monospace; font-weight: 700; font-size: 14px; fill: #475569; letter-spacing: 1px; }
      .value-text { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 15px; fill: #0F172A; }
      .pill-text { font-family: 'Fira Code', monospace; font-weight: 500; font-size: 13px; fill: #10B981; }
      .social-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; fill: #475569; }
      .ascii-text { font-family: 'Fira Code', monospace; font-size: 11px; line-height: 11px; font-weight: 700; letter-spacing: 2px; }
    </style>

    <linearGradient id="bg-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <linearGradient id="panel-grad-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.98" />
    </linearGradient>

    <linearGradient id="shimmer-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="glow-subtle-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <clipPath id="role-clip-1-l">
      <rect x="525" y="145" height="30" width="0">
        <animate attributeName="width" values="0;180;180;0;0" dur="5s" repeatCount="indefinite"
                 keyTimes="0;0.24;0.48;0.58;1" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1;0 0 1 1" />
      </rect>
    </clipPath>

    <clipPath id="role-clip-2-l">
      <rect x="525" y="145" height="30" width="0">
        <animate attributeName="width" values="0;0;270;270;0" dur="5s" repeatCount="indefinite"
                 keyTimes="0;0.58;0.82;0.94;1" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1" />
      </rect>
    </clipPath>
  </defs>

  <!-- Outer Canvas background -->
  <rect width="1180" height="610" rx="20" fill="url(#bg-grad-light)" stroke="rgba(15,23,42,0.05)" stroke-width="2"/>

  <!-- Background decorative floating elements -->
  <circle cx="200" cy="150" r="120" fill="#2563EB" opacity="0.02" filter="url(#glow-subtle-light)"/>
  <circle cx="950" cy="450" r="160" fill="#06B6D4" opacity="0.02" filter="url(#glow-subtle-light)"/>

  <!-- Dynamic scanline element -->
  <rect width="1180" height="3" fill="rgba(6, 182, 212, 0.01)">
    <animate attributeName="y" values="-10;620" dur="8s" repeatCount="indefinite" />
  </rect>

  <!-- Shimmering Border Path -->
  <rect x="10" y="10" width="1160" height="590" rx="16" fill="none" stroke="url(#shimmer-light)" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- LEFT PANEL: ASCII ART PORTRAIT -->
  <g transform="translate(30, 30)">
    <!-- Panel Container -->
    <rect width="420" height="550" rx="14" fill="url(#panel-grad-light)" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>
    
    <g transform="translate(10, 40)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animateTransform attributeName="transform" type="translate" values="10,50;10,40" dur="2s" fill="freeze" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      
      <!-- Generated Precise Structural ASCII Grid -->
      <!-- Hair & Deep Shadows: Deep Blue (#1D4ED8) -->
      <!-- Facial Contours & Edges: Cyan-Blue (#0284C7) -->
      <!-- Midtones: Teal (#0891B2) -->
      <!-- Highlights: Dark Slate (#0F172A) -->
      <!-- Shirt: Medium Blue (#2563EB) -->
      <text class="ascii-text" x="25" y="20">
        <tspan dy="12" x="25" fill="#1D4ED8">       .++%@@@@@@@@@@@@@@@%++.</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">     -+%@@@@@@@@@@@@@@@@@@@@@%+-</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">   .+%@@@@@@@@@@@@@@@@@@@@@@@@@%+.</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">  +@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@+</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">  %@@@@@@@@@@@@@@@%%@@@@@@@@@@@@@@%</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">  %@@@@@@%++==-....--==+%@@@@@@@%</tspan>
        <tspan dy="12" x="25" fill="#0891B2">  ====-. .:::--======--:::. .-====</tspan>
        <tspan dy="12" x="25" fill="#0F172A">       .---==+%%%%%%%+==---.</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">     -@@@@%%+=======+%%@@@@-</tspan>
        <tspan dy="12" x="25" fill="#0284C7">    -@@@%+-..          ..-+%@@@-</tspan>
        <tspan dy="12" x="25" fill="#0284C7">   .%%+-  .==%@@.  .@@%==.  -+%%.</tspan>
        <tspan dy="12" x="25" fill="#0F172A">   ==.   .**.  .**.   .==</tspan>
        <tspan dy="12" x="25" fill="#0891B2">   :.    ......      ......    .:</tspan>
        <tspan dy="12" x="25" fill="#0F172A">         .::   .----.   ::.</tspan>
        <tspan dy="12" x="25" fill="#0891B2">        .::.  :=++++=:  .::.</tspan>
        <tspan dy="12" x="25" fill="#0284C7">        ::.   +======+   .::</tspan>
        <tspan dy="12" x="25" fill="#0F172A">       ..     -======-     ..</tspan>
        <tspan dy="12" x="25" fill="#0284C7">   :-.         :====:         .-:</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">   %@%+=--..    .==.    ..--=+%@%</tspan>
        <tspan dy="12" x="25" fill="#1D4ED8">   %@@@@@@%%+========+%%@@@@@@%</tspan>
        <tspan dy="12" x="25" fill="#0284C7">   .%%@@@@@@@@@@@@@@@@@@@@@@@@%%.</tspan>
        <tspan dy="12" x="25" fill="#0284C7">    .-%@@@@@@@@@@@@@@@@@@@@@@%-.</tspan>
        <tspan dy="12" x="25" fill="#0891B2">      .+%@@@@@@@@@@@@@@@@@@%+.</tspan>
        <tspan dy="12" x="25" fill="#0891B2">        .-%@@@@@@@@@@@@%-.</tspan>
        <tspan dy="12" x="25" fill="#0284C7">           .:-==++++==-:.</tspan>
        <tspan dy="12" x="25" fill="#2563EB">             ||||||||||</tspan>
        <tspan dy="12" x="25" fill="#2563EB">             ||||||||||</tspan>
        <tspan dy="12" x="25" fill="#2563EB">         .---||||||||||---.</tspan>
        <tspan dy="12" x="25" fill="#2563EB">       .-=================-.</tspan>
        <tspan dy="12" x="25" fill="#2563EB">      -=====================-</tspan>
        <tspan dy="12" x="25" fill="#2563EB">     +=======================+</tspan>
        <tspan dy="12" x="25" fill="#2563EB">    +=========================+</tspan>
        <tspan dy="12" x="25" fill="#2563EB">   =============================</tspan>
      </text>
    </g>

    <!-- Subtle panel border glow sync -->
    <rect width="420" height="550" rx="14" fill="none" stroke="#0284C7" stroke-width="1" opacity="0.08"/>
  </g>

  <!-- RIGHT PANEL: PREMIUM TERMINAL AND METRICS -->
  <g transform="translate(480, 30)">
    <!-- Base Panel Layout Background -->
    <rect width="670" height="550" rx="14" fill="url(#panel-grad-light)" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>
    
    <!-- Top Terminal Decorative Header Bar -->
    <path d="M0,14 J0,14 14,0 L656,0 J670,0 670,14 L670,42 L0,42 Z" fill="#E2E8F0" opacity="0.9"/>
    <circle cx="25" cy="21" r="6" fill="#EF4444" />
    <circle cx="45" cy="21" r="6" fill="#F59E0B" />
    <circle cx="65" cy="21" r="6" fill="#10B981" />
    <text x="335" y="26" font-family="'Fira Code', monospace" font-size="13" fill="#64748B" text-anchor="middle">terminal - profile_info.sh</text>

    <!-- Header Content Greeting -->
    <g transform="translate(45, 95)">
      <text class="title-text" x="0" y="0">Hi 👋 I’m NIDHIN K</text>
    </g>

    <!-- Critical Role Typewriter Stream -->
    <g transform="translate(45, 145)">
      <!-- System Shell Prompt Segment -->
      <text class="terminal-prompt" x="0" y="20">$ Data Analyst</text>
      
      <!-- Role Variant Space Block 1 (Data Analytics) -->
      <g clip-path="url(#role-clip-1-l)">
        <text class="terminal-role" x="175" y="20">/ Data Analytics</text>
        <rect x="175" y="23" width="165" height="2" fill="#2563EB" opacity="0.15"/>
      </g>
      
      <!-- Role Variant Space Block 2 (Open Source Contributor) -->
      <g clip-path="url(#role-clip-2-l)">
        <text class="terminal-role" x="175" y="20">/ Open Source Contributor</text>
        <rect x="175" y="23" width="265" height="2" fill="#2563EB" opacity="0.15"/>
      </g>

      <!-- Unitary Shared Terminal Blinking Block Cursor -->
      <rect y="2" width="10" height="22" fill="#06B6D4">
        <animateTransform attributeName="transform" type="translate" values="170,0;350,0;350,0;170,0;170,0" dur="5s" repeatCount="indefinite"
                          keyTimes="0;0.24;0.48;0.58;1" calcMode="discrete"/>
        <animateTransform attributeName="transform" type="translate" values="170,0;445,0;445,0;170,0;170,0" dur="5s" repeatCount="indefinite"
                          keyTimes="0;0.58;0.82;0.94;1" calcMode="discrete" additive="sum"/>
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
      </rect>
